name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: HLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: haskell-actions/hlint-setup@v2
      - uses: haskell-actions/hlint-run@v2
        with:
          path: '["src/", "test/"]'
          fail-on: warning

  format:
    name: Ormolu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: haskell-actions/run-ormolu@v16
        with:
          pattern: |
            src/**/*.hs
            test/**/*.hs

  cabal-check:
    name: Cabal Check
    needs: [lint, format]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.8'
          cabal-version: 'latest'
      - run: cabal check

  build:
    name: Build (${{ matrix.os }})
    needs: [lint, format, cabal-check]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.8'
          cabal-version: 'latest'
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-ghc-9.8-${{ hashFiles('firebase-hs.cabal') }}
          restore-keys: ${{ runner.os }}-ghc-9.8-
      - run: cabal update
      - run: cabal build --ghc-options="-Werror"
      - run: cabal test --enable-tests
